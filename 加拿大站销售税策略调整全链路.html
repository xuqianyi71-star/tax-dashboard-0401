        const dim3EventMarkLines = [
            { xAxis: 'Day1\n3/11', name: 'GST/PST 上线', lineStyle: { color: '#ff4d4f', width: 2, type: 'dashed' }, label: { show: true, formatter: 'GST/PST 上线', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#ff4d4f', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#ff4d4f', borderWidth: 1, borderRadius: 12 } },
            { xAxis: 'Day10\n3/20', name: '物流时效不可达', lineStyle: { color: '#d46b08', width: 2, type: 'dashed' }, label: { show: true, formatter: '物流时效不可达', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#d46b08', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#d46b08', borderWidth: 1, borderRadius: 12 } }
        ];

        function updateSlicerChartDim3(metricKey) {
            const cfg = metricConfigDim3[metricKey];
            const p = dim3Data[currentDim3Panel];
            // 生成带日期的标签
            const dayLabels = Array.from({ length: 21 }, (_, i) => {
                const date = days2[i];
                return `Day${i+1}\n${date}`;
            });

            // 根据指标类型设置Y轴范围
            let yAxisConfig = { type: 'value', name: cfg.yName, axisLabel: { formatter: '{value}' + cfg.unit } };

            // CK率、提交订单率、支付成功率设置固定范围以更好展示变动
            if (metricKey === 'ck') {
                yAxisConfig = { type: 'value', name: cfg.yName, min: 45, max: 70, axisLabel: { formatter: '{value}' + cfg.unit } };
            } else if (metricKey === 'submit') {
                yAxisConfig = { type: 'value', name: cfg.yName, min: 50, max: 70, axisLabel: { formatter: '{value}' + cfg.unit } };
            } else if (metricKey === 'pay') {
                yAxisConfig = { type: 'value', name: cfg.yName, min: 85, max: 100, axisLabel: { formatter: '{value}' + cfg.unit } };
            }

            const option = {
                title: { text: `${cfg.name} 对比趋势`, subtext: p.subtext, left: 'center', top: 5, textStyle: { fontSize: 16 }, subtextStyle: { fontSize: 12, color: '#666' } },
                tooltip: { trigger: 'axis' },
                legend: { data: ['2025年', '2026年'], top: 45 },
                grid: { top: '22%', left: '7%', right: '8%', bottom: '15%', containLabel: true },
                xAxis: { type: 'category', data: dayLabels, axisLabel: { rotate: 0, fontSize: 10, interval: 0, lineHeight: 14 } },
                yAxis: yAxisConfig,
                series: [
                    { name: '2025年', type: 'line', data: p[cfg.key2025], smooth: true },
                    { name: '2026年', type: 'line', data: cfg.key2026, smooth: true },
                    // 独立的事件标记系列
                    { name: '事件标记', type: 'line', data: [], markLine: { data: dim3EventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
                ]
            };
            slicerChart.setOption(option, true);
        }

        function updateEventNote(tabId) {
            const div = document.getElementById('eventNoteArea');
            if (tabId === '3') {
                div.innerHTML = `<div><strong style="color: #d46b08;">经济线物流时效不可达 (Day10 / 3/20 全天)</strong><br/>复活节物流影响：结算页预估经济线时效在复活节前不可达。</div>`;
            } else {
                div.innerHTML = `<div style="display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between;">
                    <div style="flex: 1; min-width: 200px;"><strong style="color: #ff4d4f;">GST/PST 上线 (3/11 15:00)</strong><br/>加拿大站点 GST/PST 上线，购物车和CK环节显示 "calculated at checkout"，支付环节显示 GST/PST 税费。</div>
                    <div style="flex: 1; min-width: 200px;"><strong style="color: #d46b08;">经济线物流时效不可达 (3/20 全天)</strong><br/>复活节物流影响：结算页预估经济线时效在复活节前不可达。</div>
                </div>`;
            }
        }

        const conclusionTexts = {
            '1': { title: '维度一：全站趋势复盘', content: `<ul><li><strong>GST/PST税费冲击显著</strong>：3/11税费上线后，转化率从基准2.78%大幅波动，最低跌至1.97%，21天平均值为2.43%，低于基准水平。</li><li><strong>毛利率出现剧烈波动</strong>：毛利率大幅波动最低值达-3.96%，最高值达23.26%。其中3/31日的毛利率最高出现收到大金额订单影响，拉高全站水平。</li><li><strong>加购率出现波动</strong>：因为加拿大站点前段不显示税费，在上税后加购率几乎未受到影响。但因3月20日起加拿大商品复活节经济线物流不可达影响，在20-25日期间出现下滑波动情况，后续逐步回升。</li><li><strong>CPC逐步下降</strong>：因英语站点主要广告投放方式为统投，虽然获客成本变低，但由于统一投放的方式，存在分配给加拿大站点流量不够精准，优质流量减少的问题。</li></ul>` },
            '2': { title: '维度二：结算端提交与支付表现复盘', content: `<ul><li><strong>提交订单率持续承压</strong>：提交订单率从基准56.73%波动下行，平均54.34%，最低跌至50.31%（3/27），税费感知导致用户在结算环节犹豫增加。</li><li><strong>支付成功率相对稳定</strong>：支付成功率基准92.81%，平均90.80%，虽有波动但总体维持在85%以上，并开始逐步回升，因后端环节中提交订单已经筛选过一轮用户，比起提交订单环节首影响较小。</li><li><strong>物流时效影响有限</strong>：3/20经济线物流时效不可达事件对支付成功率影响有限。</li></ul>` },
            '3': { title: '维度三：复活节同比分析 (2026 vs 2025)', content: `<ul><li><strong>2025年复活节商品占比较低</strong>：2025年复活节期间，加拿大站点热卖商品中复活节商品占比较小，热卖品TOP1为高尔夫球印章，流量占全站18%。全站浏览人数中，非复活节商品占比为93.26%，复活节商品为6.74%。因此2025年同期指标受复活节经济线不可达因素影响较小。</li><li><strong>2026年核心指标下滑</strong>：相较2025年数据，转化率、加购率、提交订单率和支付成功率均下滑，主要受到税费政策冲击。此外因2025年和2026年商品结构不同，加购率在2026年受物流时效不可达事件影响，在20日当日出现更明显的下滑情况，后续逐步回升。</li><li><strong>2026年相较同比和同时期业务规模扩大</strong>：相较2025年同比，整体业务规模扩大，浏览人数增长但转化率下滑，因税费原因导致转化环节的表现较去年有所下降。</li><li><strong>FB-CPC和谷歌-CPC</strong>：加拿大FB广告投放主要采用统投方式，虽然FB获客成本较去年同期下降，但也导致广告投放流量不够精准。</li></ul>` }
        };

        function updateConclusion(tabId) {
            const data = conclusionTexts[tabId];
            document.getElementById('conclusionTabName').innerText = data.title;
            document.getElementById('conclusionContent').innerHTML = data.content;
        }

        // ---------- 标签页切换逻辑 ----------
        let currentTab = '1';
        let currentDim3Panel = 'yoy';

        // 维度一的关键事件标记线（独立系列，不受图例控制）
        const dim1EventMarkLines = [
            { xAxis: '3/11', name: 'GST/PST 上线', lineStyle: { color: '#ff4d4f', width: 2, type: 'dashed' }, label: { show: true, formatter: 'GST/PST 上线', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#ff4d4f', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#ff4d4f', borderWidth: 1, borderRadius: 12 } },
            { xAxis: '3/20', name: '物流时效不可达', lineStyle: { color: '#d46b08', width: 2, type: 'dashed' }, label: { show: true, formatter: '物流时效不可达', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#d46b08', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#d46b08', borderWidth: 1, borderRadius: 12 } }
        ];

        const option1 = {
            title: { text: '维度一：全站核心趋势 (转化/加购/毛利)', left: 'center', top: 8, textStyle: { fontSize: 16, fontWeight: 'normal' } },
            tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
            legend: { data: ['转化率', '加购率', '毛利率'], top: 48 },
            grid: { top: '18%', left: '7%', right: '8%', bottom: '12%', containLabel: true },
            xAxis: { type: 'category', data: dateAxis, axisLabel: { rotate: 35, fontSize: 11, interval: 0 } },
            yAxis: [
                { type: 'value', name: '率 (%)', min: 0, max: 15, axisLabel: { formatter: '{value}%' } },
                { type: 'value', name: '毛利率 (%)', min: -5, max: 30, position: 'right', axisLabel: { formatter: '{value}%' } }
            ],
            series: [
                { name: '转化率', type: 'line', smooth: true, yAxisIndex: 0, data: [2.78, ...cvr2026] },
                { name: '加购率', type: 'line', smooth: true, yAxisIndex: 0, data: [9.32, ...addcart2026] },
                { name: '毛利率', type: 'bar', yAxisIndex: 1, data: [11.75, ...gpm2026], itemStyle: { color: p => p.value >= 0 ? '#ff4d4f' : '#52c41a' } },
                // 独立的事件标记系列，不显示在图例中
                { name: '事件标记', type: 'line', yAxisIndex: 0, data: [], markLine: { data: dim1EventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
            ]
        };

        // 维度二的关键事件标记线
        const dim2EventMarkLines = [
            { xAxis: '3/11', name: 'GST/PST 上线', lineStyle: { color: '#ff4d4f', width: 2, type: 'dashed' }, label: { show: true, formatter: 'GST/PST 上线', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#ff4d4f', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#ff4d4f', borderWidth: 1, borderRadius: 12 } },
            { xAxis: '3/20', name: '物流时效不可达', lineStyle: { color: '#d46b08', width: 2, type: 'dashed' }, label: { show: true, formatter: '物流时效不可达', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#d46b08', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#d46b08', borderWidth: 1, borderRadius: 12 } }
        ];

        const option2 = {
            title: { text: '维度二：结算端提交与支付表现', left: 'center', top: 8, textStyle: { fontSize: 16 } },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { data: ['提交订单率', '支付成功率'], top: 48 },
            grid: { top: '18%', left: '7%', right: '8%', bottom: '12%' },
            xAxis: { type: 'category', data: days2, axisLabel: { rotate: 35, fontSize: 11 } },
            yAxis: [
                { type: 'value', name: '提交订单率 (%)', min: 45, max: 65, axisLabel: { formatter: '{value}%' } },
                { type: 'value', name: '支付成功率 (%)', min: 75, max: 98, position: 'right', axisLabel: { formatter: '{value}%' } }
            ],
            series: [
                { name: '提交订单率', type: 'line', smooth: true, yAxisIndex: 0, data: submit2026, markLine: { data: [{ yAxis: 56.73, name: '基准', lineStyle: { color: '#1890ff', type: 'dashed' } }] } },
                { name: '支付成功率', type: 'line', smooth: true, yAxisIndex: 1, data: pay2026, markLine: { data: [{ yAxis: 92.81, name: '基准', lineStyle: { color: '#52c41a', type: 'dashed' } }] } },
                // 独立的事件标记系列
                { name: '事件标记', type: 'line', yAxisIndex: 0, data: [], markLine: { data: dim2EventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
            ]
        };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.getAttribute('data-tab');
                
                document.getElementById('dim3PanelContainer').style.display = (currentTab === '3' ? 'block' : 'none');
                document.getElementById('mainContainer').style.display = (currentTab === '3' ? 'none' : 'block');
                document.getElementById('slicerChartContainer').style.display = (currentTab === '2' ? 'none' : 'block');
                document.getElementById('slicerTitle').innerText = (currentTab === '1' ? '维度一核心指标趋势 (切片器)' : '维度三指标对比 (切片器)');
                
                updateEventNote(currentTab);
                updateConclusion(currentTab);
                
                const firstMetric = updateSlicerButtons(currentTab);
                if (currentTab === '1') {
                    myChart.setOption(option1, true);
                    updateSlicerChartDim1(firstMetric);
                } else if (currentTab === '2') {
                    myChart.setOption(option2, true);
                    // 维度二不显示切片器
                } else {
                    updateSlicerChartDim3(firstMetric);
                }
            });
        });

        document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDim3Panel = this.getAttribute('data-panel');
                const activeMetric = document.querySelector('#slicerBtnGroup .slicer-btn.active').getAttribute('data-metric');
                updateSlicerChartDim3(activeMetric);
            });
        });

        window.addEventListener('resize', () => { myChart.resize(); slicerChart.resize(); });

        // ---------- 初始化 ----------
        updateEventNote('1');
        updateConclusion('1');
        const initMetric = updateSlicerButtons('1');
        myChart.setOption(option1);
        updateSlicerChartDim1(initMetric);
    };
</script>
</body>
</html>
